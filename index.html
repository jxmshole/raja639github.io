<!DOCTYPE html>
<html>
<head>
    <title>My Web</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(#2b003f, #4b0082);
            color: white;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #3a0057;
        }

        .btn-livechat {
            background: gold;
            padding: 8px 15px;
            border-radius: 20px;
            color: black;
        }

        .banner img {
            width: 90%;
            border-radius: 15px;
            margin-top: 10px;
        }

        .btn {
            width: 80%;
            margin: 10px auto;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
        }

        .login {
            background: linear-gradient(purple, magenta);
            color: white;
        }

        .daftar {
            background: linear-gradient(#ff00cc, #cc00ff);
            color: white;
        }

        .navbar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #2b003f;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Raja639</h2>
        <div class="btn-livechat">Livechat</div>
    </div>

    <div class="banner">
        <img src="https://via.placeholder.com/400x200">
    </div>

    <h3>Silahkan klik login untuk bermain</h3>

    <button class="btn login">LOGIN</button>
    <button class="btn daftar">DAFTAR</button>

    <div class="navbar">
        <div>🏠 Beranda</div>
        <div>📢 Promosi</div>
        <div>🏆 Event</div>
        <div>💬 Livechat</div>
    </div>

</body>
</html>
